<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-10 Nebula: 실시간 드림 보드</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0d1b2a 0%, #010204 100%);
            font-family: 'Pretendard', sans-serif;
            color: white;
        }

        .admin-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .admin-panel h2 {
            font-size: 0.9rem;
            margin: 0 0 5px 0;
            color: #00f2ff;
            letter-spacing: 2px;
        }

        select,
        input,
        button {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
        }

        button {
            cursor: pointer;
            background: #00f2ff;
            color: #000;
            font-weight: bold;
            border: none;
            transition: all 0.3s;
        }

        button:hover {
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px #00f2ff;
        }

        button.delete-btn {
            background: #ff4d4d;
            color: white;
            margin-top: 5px;
        }

        .ui-header {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }

        .ui-header h1 {
            font-weight: 200;
            font-size: 1.6rem;
            letter-spacing: 10px;
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <div class="ui-header">
        <h1>NEBULA: 3-10</h1>
    </div>

    <div class="admin-panel">
        <h2>나의 별 추가</h2>
        <select id="studentId">
            <option value="">번호 선택</option>
        </select>
        <input type="text" id="dreamInput" placeholder="당신의 꿈을 입력">
        <button onclick="addOrUpdateStar()">궤도에 띄우기</button>
        <button class="delete-btn" onclick="deleteStar()">내 별 삭제</button>
    </div>

    <canvas id="nebulaCanvas"></canvas>

    <script type="module">
        // 1. Firebase 라이브러리 로드
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 2. 이미지의 정보를 바탕으로 입력된 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyBO6rLxPHh371W00IBIKOnX6kH__h_BJpw",
            authDomain: "nebula-3-10.firebaseapp.com",
            // ★ Realtime Database 주소 (프로젝트ID 기반)
            databaseURL: "https://nebula-3-10-default-rtdb.firebaseio.com",
            projectId: "nebula-3-10",
            storageBucket: "nebula-3-10.firebasestorage.app",
            messagingSenderId: "911315459083",
            appId: "1:911315459083:web:f9097f801143c58c423b0e",
            measurementId: "G-GMDK271NV3"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dreamsRef = ref(db, 'dreams');

        const canvas = document.getElementById('nebulaCanvas');
        const ctx = canvas.getContext('2d');
        const selectEl = document.getElementById('studentId');
        const dreamInput = document.getElementById('dreamInput');

        let width, height, centerX, centerY;
        let stars = [];
        let studentData = {};

        // 번호 초기화 (1~28)
        for (let i = 1; i <= 28; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i + '번';
            selectEl.appendChild(opt);
        }

        // 실시간 데이터 감시: 누군가 추가하면 모든 화면에 즉시 반영됨
        onValue(dreamsRef, (snapshot) => {
            studentData = snapshot.val() || {};
            refreshStars();
        });

        window.addEventListener('resize', initCanvas);
        const mouse = { x: -1000, y: -1000, radius: 200 };
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class CentralPlanet {
            draw() {
                ctx.save();
                ctx.translate(centerX, centerY);
                let dist = Math.sqrt((mouse.x - centerX) ** 2 + (mouse.y - centerY) ** 2);
                let r = dist < 200 ? 85 + (200 - dist) / 5 : 80;
                let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
                grad.addColorStop(0, '#1b2735');
                grad.addColorStop(1, '#020205');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 50;
                ctx.shadowColor = "#00f2ff";
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = "white";
                ctx.fillStyle = "white";
                ctx.font = "bold 24px Pretendard";
                ctx.textAlign = "center";
                ctx.fillText("3학년 10반", 0, 10);
                ctx.restore();
            }
        }
        const planet = new CentralPlanet();

        class Star {
            constructor(id, dream) {
                this.id = id;
                this.dream = dream;
                this.orbitRadius = Math.random() * (width < 600 ? 120 : 250) + 120;
                this.angle = Math.random() * Math.PI * 2;
                this.orbitSpeed = (Math.random() * 0.003) + 0.001;
                this.baseSize = 24;
            }

            draw() {
                let x = centerX + Math.cos(this.angle) * this.orbitRadius;
                let y = centerY + Math.sin(this.angle) * this.orbitRadius;
                ctx.save();
                ctx.translate(x, y);
                let dist = Math.sqrt((mouse.x - x) ** 2 + (mouse.y - y) ** 2);
                let size = dist < 150 ? this.baseSize + (150 - dist) / 6 : this.baseSize;
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#00f2ff";
                ctx.fillStyle = "white";
                ctx.font = `600 ${size}px 'Pretendard'`;
                ctx.textAlign = "center";
                ctx.fillText(this.dream, 0, 0);
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.font = "12px Arial";
                ctx.fillText(this.id + '번', 0, -size);
                ctx.restore();
                this.currentX = x;
                this.currentY = y;
            }

            update() {
                this.angle += this.orbitSpeed;
            }
        }

        function refreshStars() {
            stars = [];
            Object.keys(studentData).forEach(id => {
                stars.push(new Star(id, studentData[id]));
            });
        }

        // 버튼 함수들을 전역(window)에 등록
        window.addOrUpdateStar = function () {
            const id = selectEl.value;
            const dream = dreamInput.value.trim();
            if (!id || !dream) return alert("번호와 꿈을 입력하세요!");

            // Firebase에 저장
            set(ref(db, 'dreams/' + id), dream);
            dreamInput.value = "";
        }

        window.deleteStar = function () {
            const id = selectEl.value;
            if (!id || !studentData[id]) return alert("삭제할 별이 없습니다.");

            // Firebase에서 삭제
            remove(ref(db, 'dreams/' + id));
        }

        function connect() {
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    let dx = stars[i].currentX - stars[j].currentX;
                    let dy = stars[i].currentY - stars[j].currentY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 250) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${(1 - dist / 250) * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(stars[i].currentX, stars[i].currentY);
                        ctx.lineTo(stars[j].currentX, stars[j].currentY);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            planet.draw();
            stars.forEach(s => {
                s.update();
                s.draw();
            });
            connect();
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
    </script>
</body>

</html>
